<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */

        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <!-- <script src="script.js"></script> -->
        <script type="module">
            // JS
import kaboom from "https://unpkg.com/kaboom/dist/kaboom.mjs"

kaboom({
    background: [15, 15, 25],
})

// PLAYER
let player = add([
    rect(20, 20),
    pos(120, 250),
    color(0, 200, 255),
    area(),
])

// BALL
let ball = add([
    circle(18),
    pos(300, 250),
    color(255, 255, 255),
    area(),
])

// FASTER BALL SPEED
let ballSpeed = vec2(9, 7)

// LESS FRICTION
let friction = 0.999999

// ARM VALUES
let armLength = 80
let armAngle = 0
let charging = false
let swingSpeed = 0

// HANDBALL WALL
add([
    rect(40, height()),
    pos(width() - 40, 0),
    color(100, 100, 255),
])

// FLOOR + CEILING
add([
    rect(width(), 20),
    pos(0, 0),
])

add([
    rect(width(), 20),
    pos(0, height() - 20),
])

// ARM
let arm = add([
    rect(armLength, 10),
    pos(player.pos),
    anchor("left"),
    rotate(0),
    color(255, 200, 0),
])

// HAND
let hand = add([
    circle(15),
    pos(player.pos),
    color(255, 100, 100),
])

// MOVEMENT
onKeyDown("w", () => {
    player.move(0, -300)
})

onKeyDown("a", () => {
    player.move(-300, 0)
})

onKeyDown("s", () => {
    player.move(0, 300)
})

onKeyDown("d", () => {
    player.move(300, 0)
})

// CHARGE ARM
onKeyDown("space", () => {

    charging = true

    if (swingSpeed < 140) {
        swingSpeed += 4
    }
})

// RELEASE SWING
onKeyRelease("space", () => {

    charging = false

    armAngle += swingSpeed * 2

    // HIT BALL
    if (hand.pos.dist(ball.pos) < 50) {

        let dir = ball.pos.sub(player.pos).unit()

        // HARDER HIT
        ballSpeed = dir.scale(18 + swingSpeed / 2)
    }

    swingSpeed = 0
})

// UPDATE LOOP
onUpdate(() => {

    // KEEP PLAYER INSIDE SCREEN
    player.pos.x = clamp(player.pos.x, 20, width() - 100)
    player.pos.y = clamp(player.pos.y, 30, height() - 30)

    // ARM RETRACT
    if (charging) {
        armLength = lerp(armLength, 35, 0.25)
    } else {
        armLength = lerp(armLength, 80, 0.12)
        armAngle = lerp(armAngle, 0, 0.1)
    }

    // ARM POSITION
    arm.pos = player.pos
    arm.width = armLength
    arm.angle = armAngle

    // HAND POSITION
    let handX =
        player.pos.x +
        Math.cos(deg2rad(armAngle)) * armLength

    let handY =
        player.pos.y +
        Math.sin(deg2rad(armAngle)) * armLength

    hand.pos = vec2(handX, handY)

    // MOVE BALL
    ball.move(ballSpeed.x, ballSpeed.y)

    // LOW FRICTION
    ballSpeed = ballSpeed.scale(friction)

    // KEEP SPEED HIGH
    if (ballSpeed.len() < 8) {
        ballSpeed = ballSpeed.unit().scale(8)
    }

    // TOP/BOTTOM BOUNCE
    if (ball.pos.y < 35 || ball.pos.y > height() - 35) {
        ballSpeed.y *= -1
    }

    // LEFT WALL BOUNCE
    if (ball.pos.x < 35) {
        ballSpeed.x *= -1
    }

    // FRONT HANDBALL WALL
    if (ball.pos.x > width() - 55) {
        ballSpeed.x *= -1.08
    }
})

// UI TEXT
add([
    text("WASD MOVE  |  HOLD SPACE TO SWING"),
    pos(20, 20),
    scale(1),
])
        </script>
    </body>
</html>
