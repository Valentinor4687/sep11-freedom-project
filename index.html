<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */

        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <!-- <script src="script.js"></script> -->
        <script type="module">
            // JS
import kaboom from "https://unpkg.com/kaboom/dist/kaboom.mjs"

kaboom({
    background: [15, 15, 25],
})

// box
let player = add([
    rect(20, 20),
    pos(120, 250),
    color(0, 200, 255),
    area(),
])

// ball
let ball = add([
    circle(18),
    pos(300, 250),
    color(255, 255, 255),
    area(),
])

// speed
let ballSpeed = vec2(9, 7)

// friction/bounde
let friction = 0.999999

// arm/rect
let armLength = 80
let armAngle = 0
let charging = false
let swingSpeed = 0

// front wall
add([
    rect(40, height()),
    pos(width() - 40, 0),
    color(100, 100, 255),
])

// top wall
add([
    rect(width(), 20),
    pos(0, 0),
])

add([
    rect(width(), 20),
    pos(0, height() - 20),
])

// arm
let arm = add([
    rect(armLength, 10),
    pos(player.pos),
    anchor("left"),
    rotate(0),
    color(255, 200, 0),
])

// hand/circle
let hand = add([
    circle(15),
    pos(player.pos),
    color(255, 100, 100),
])

// moving
onKeyDown("w", () => {
    player.move(0, -300)
})

onKeyDown("a", () => {
    player.move(-300, 0)
})

onKeyDown("s", () => {
    player.move(0, 300)
})

onKeyDown("d", () => {
    player.move(300, 0)
})

// charging back
onKeyDown("space", () => {

    charging = true

    if (swingSpeed < 140) {
        swingSpeed += 4
    }
})

// swing
onKeyRelease("space", () => {

    charging = false

    armAngle += swingSpeed * 2

    // contact
    if (hand.pos.dist(ball.pos) < 50) {

        let dir = ball.pos.sub(player.pos).unit()

        // contact from swing
        ballSpeed = dir.scale(18 + swingSpeed / 2)
    }

    swingSpeed = 0
})

onUpdate(() => {

    player.pos.x = clamp(player.pos.x, 20, width() - 100)
    player.pos.y = clamp(player.pos.y, 30, height() - 30)

    // retract
    if (charging) {
        armLength = lerp(armLength, 35, 0.25)
    } else {
        armLength = lerp(armLength, 80, 0.12)
        armAngle = lerp(armAngle, 0, 0.1)
    }

    arm.pos = player.pos
    arm.width = armLength
    arm.angle = armAngle

    let handX =
        player.pos.x +
        Math.cos(deg2rad(armAngle)) * armLength

    let handY =
        player.pos.y +
        Math.sin(deg2rad(armAngle)) * armLength

    hand.pos = vec2(handX, handY)

    // ball movement
    ball.move(ballSpeed.x, ballSpeed.y)


    ballSpeed = ballSpeed.scale(friction)


    if (ballSpeed.len() < 8) {
        ballSpeed = ballSpeed.unit().scale(8)
    }

    // bounce up/down
    if (ball.pos.y < 35 || ball.pos.y > height() - 35) {
        ballSpeed.y *= -1
    }

    // back wall
    if (ball.pos.x < 35) {
        ballSpeed.x *= -1
    }

    // front wall
    if (ball.pos.x > width() - 55) {
        ballSpeed.x *= -1.08
    }
})

// directions
add([
    text("WASD MOVE  |  HOLD SPACE TO SWING"),
    pos(20, 20),
    scale(1),
])
        </script>
    </body>
</html>
